<!-- World Clock Entry Component Template (T017) -->

<mat-card 
  role="region" 
  [attr.aria-label]="ariaLabel()"
  class="clock-card">
  
  <mat-card-header>
    <mat-card-title class="region-name">{{ entry.region }}</mat-card-title>
    <mat-card-subtitle class="city-name">{{ entry.city }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <!-- Digital Clock Display (format === 'digital') -->
    @if (format === 'digital') {
      <div
        class="digital-clock"
        aria-live="polite"
        [attr.aria-label]="'Current time: ' + formattedTime()">
        {{ formattedTime() }}
      </div>
    }

    <!-- Analog Clock Display (format === 'analog') -->
    @if (format === 'analog') {
      <div class="analog-clock" aria-label="Current analog time" role="img">
        <svg class="analog-clock__svg" viewBox="0 0 200 200" aria-hidden="true" focusable="false">
          <circle class="analog-clock__face" cx="100" cy="100" r="94"></circle>

          @if (showDialMarks) {
            <g class="analog-clock__markers">
              <line class="analog-clock__marker analog-clock__marker--major" x1="100" y1="16" x2="100" y2="28"></line>
              <line class="analog-clock__marker" x1="100" y1="16" x2="100" y2="24" transform="rotate(30 100 100)"></line>
              <line class="analog-clock__marker" x1="100" y1="16" x2="100" y2="24" transform="rotate(60 100 100)"></line>
              <line class="analog-clock__marker analog-clock__marker--major" x1="100" y1="16" x2="100" y2="28" transform="rotate(90 100 100)"></line>
              <line class="analog-clock__marker" x1="100" y1="16" x2="100" y2="24" transform="rotate(120 100 100)"></line>
              <line class="analog-clock__marker" x1="100" y1="16" x2="100" y2="24" transform="rotate(150 100 100)"></line>
              <line class="analog-clock__marker analog-clock__marker--major" x1="100" y1="16" x2="100" y2="28" transform="rotate(180 100 100)"></line>
              <line class="analog-clock__marker" x1="100" y1="16" x2="100" y2="24" transform="rotate(210 100 100)"></line>
              <line class="analog-clock__marker" x1="100" y1="16" x2="100" y2="24" transform="rotate(240 100 100)"></line>
              <line class="analog-clock__marker analog-clock__marker--major" x1="100" y1="16" x2="100" y2="28" transform="rotate(270 100 100)"></line>
              <line class="analog-clock__marker" x1="100" y1="16" x2="100" y2="24" transform="rotate(300 100 100)"></line>
              <line class="analog-clock__marker" x1="100" y1="16" x2="100" y2="24" transform="rotate(330 100 100)"></line>
            </g>

            <g class="analog-clock__numerals" aria-hidden="true">
              <text x="100" y="44" text-anchor="middle" dominant-baseline="middle">12</text>
              <text x="156" y="100" text-anchor="middle" dominant-baseline="middle">3</text>
              <text x="100" y="156" text-anchor="middle" dominant-baseline="middle">6</text>
              <text x="44" y="100" text-anchor="middle" dominant-baseline="middle">9</text>
            </g>
          }

          <circle class="analog-clock__center" cx="100" cy="100" r="4"></circle>

          <line
            class="analog-clock__hand analog-clock__hand--hour"
            x1="100"
            y1="100"
            x2="100"
            y2="62"
            [style.transform]="'rotate(' + hourHandRotation() + 'deg)'"
          ></line>

          <line
            class="analog-clock__hand analog-clock__hand--minute"
            x1="100"
            y1="100"
            x2="100"
            y2="42"
            [style.transform]="'rotate(' + minuteHandRotation() + 'deg)'"
          ></line>

          <line
            class="analog-clock__hand analog-clock__hand--second"
            x1="100"
            y1="108"
            x2="100"
            y2="30"
            [style.transform]="'rotate(' + secondHandRotation() + 'deg)'"
          ></line>
        </svg>
      </div>
    }

    <!-- UTC Offset Label -->
    <p class="utc-offset">{{ utcOffsetDisplay() }}</p>
  </mat-card-content>
</mat-card>
