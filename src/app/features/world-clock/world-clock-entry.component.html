<!-- World Clock Entry Component Template (T017) -->

<mat-card 
  role="region" 
  [attr.aria-label]="ariaLabel()"
  class="clock-card">
  
  <mat-card-header>
    <h3 class="region-name">{{ entry.region }}</h3>
    <p class="city-name">{{ entry.city }}</p>
  </mat-card-header>

  <mat-card-content>
    <!-- Digital Clock Display (format === 'digital') -->
    <div *ngIf="format === 'digital'" 
         class="digital-clock" 
         aria-live="polite"
         [attr.aria-label]="'Current time: ' + formattedTime()">
      {{ formattedTime() }}
    </div>

    <!-- Analog Clock Display (format === 'analog') -->
    <div *ngIf="format === 'analog'" class="analog-clock" aria-hidden="true">
      <!-- Placeholder for analog clock SVG (T057-T060 optional) -->
      <div class="analog-placeholder">Analog</div>
    </div>

    <!-- UTC Offset Label -->
    <p class="utc-offset">{{ utcOffsetDisplay() }}</p>
  </mat-card-content>
</mat-card>
