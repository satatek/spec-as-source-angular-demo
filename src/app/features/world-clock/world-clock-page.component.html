<!-- World Clock Page Component Template (T025-T035) -->

<div class="world-clock-page">
  <!-- Page Header -->
  <header class="page-header">
    <div class="header-content">
      <h1>{{ pageTitle }}</h1>
      <p class="subtitle">{{ pageDescription }}</p>
    </div>
    
    <div class="header-actions">
      <!-- Format Toggle Button (US2 - T042-T043) -->
      <button
        mat-icon-button
        (click)="toggleFormat()"
        [attr.aria-label]="'Switch to ' + (currentFormat() === 'digital' ? 'analog' : 'digital') + ' format'"
        class="format-toggle">
        <mat-icon>{{ currentFormat() === 'digital' ? 'schedule' : 'access_time' }}</mat-icon>
      </button>

      <!-- Hour Format Toggle Button (24h / AM-PM) -->
      <button
        mat-icon-button
        (click)="toggleHourFormat()"
        [attr.aria-label]="'Switch to ' + (use24Hour() ? 'AM/PM' : '24-hour') + ' time format'"
        class="format-toggle"
      >
        <mat-icon>{{ use24Hour() ? 'av_timer' : 'timer' }}</mat-icon>
      </button>
    </div>
  </header>

  <!-- Loading State -->
  @if (pageState().isLoading) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
      <p>Loading world times...</p>
    </div>
  }

  <!-- Error State -->
  @if (pageState().error) {
    <div class="error-container" role="alert">
      <mat-icon>error_outline</mat-icon>
      <p>{{ pageState().error }}</p>
    </div>
  }

  <!-- Clock Entries Grid (US1 Core - display three times) -->
  @if (!pageState().isLoading && !pageState().error) {
    <div
      class="clocks-grid"
      [style.--grid-columns]="gridColumns()">

      @for (entry of pageState().entries; track entry.id) {
        <app-world-clock-entry
          [entry]="entry"
          [format]="currentFormat()"
          [use24Hour]="use24Hour()">
        </app-world-clock-entry>
      }
    </div>
  }
</div>
